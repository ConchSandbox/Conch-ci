name: Conch Self-Hosted E2E

on:
  workflow_dispatch:
    inputs:
      conch_repository:
        description: Conch source repository URL
        required: false
        default: https://github.com/ConchSandbox/Conch.git
      conch_ref:
        description: Conch source ref to validate
        required: false
        default: dev-cri
      oci_image:
        description: Standard OCI rootfs image used by the e2e run
        required: false
        default: docker.io/library/busybox:latest
      kernel_path:
        description: Official Conch kernel path on the self-hosted runner
        required: false
        default: /opt/conch/bzImage
      initrd_path:
        description: Official Conch initrd path on the self-hosted runner
        required: false
        default: /opt/conch/conch.initrd

permissions:
  contents: read

concurrency:
  group: conch-self-hosted-e2e-${{ github.workflow }}
  cancel-in-progress: false

env:
  CONCH_REPOSITORY: ${{ github.event.inputs.conch_repository || vars.CONCH_REPOSITORY || 'https://github.com/ConchSandbox/Conch.git' }}
  CONCH_REF: ${{ github.event.inputs.conch_ref || vars.CONCH_REF || 'dev-cri' }}
  OCI_IMAGE: ${{ github.event.inputs.oci_image || vars.CONCH_E2E_OCI_IMAGE || 'docker.io/library/busybox:latest' }}
  CONCH_KERNEL_PATH: ${{ github.event.inputs.kernel_path || vars.CONCH_E2E_KERNEL_PATH || '/opt/conch/bzImage' }}
  CONCH_INITRD_PATH: ${{ github.event.inputs.initrd_path || vars.CONCH_E2E_INITRD_PATH || '/opt/conch/conch.initrd' }}
  CONCH_API_TIMEOUT: 15m
  GO_TAGS: exclude_graphdriver_btrfs

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: Runtime E2E
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 90

    steps:
      - name: Check self-hosted runtime prerequisites
        run: |
          set -euo pipefail

          arch="$(uname -m)"
          case "$arch" in
            aarch64|arm64) ;;
            *)
              echo "This e2e workflow must run on ARM64, got: $arch" >&2
              exit 1
              ;;
          esac

          sudo -n true
          sudo test -r /dev/kvm
          sudo test -w /dev/kvm

          for tool in git go python protoc cloud-hypervisor mkfs.erofs curl ip iptables; do
            command -v "$tool"
          done

          test -f "$CONCH_KERNEL_PATH"
          test -f "$CONCH_INITRD_PATH"
          sudo modprobe erofs
          grep -qw erofs /proc/filesystems
          mkfs_erofs_help="$(mkfs.erofs --help)"
          grep -q -- '--fsalignblks' <<<"$mkfs_erofs_help"

          go version
          python --version
          protoc --version
          cloud-hypervisor --version

      - name: Fetch Conch source
        run: |
          set -euo pipefail
          rm -rf conch-src
          git init conch-src
          cd conch-src
          git remote add origin "$CONCH_REPOSITORY"
          git fetch --depth 1 origin "$CONCH_REF"
          git checkout --detach FETCH_HEAD
          git log --oneline -1
          git status --short --branch

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache-dependency-path: conch-src/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: conch-src/sdk/pyproject.toml

      - name: Build Conch binaries and SDK
        working-directory: conch-src
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install grpcio-tools
          make gen-proto
          make build
          python -m pip install -e './sdk[test]'
          test -x ./bin/conch
          test -x ./bin/conchd
          test -x ./bin/conch-agent

      - name: Prepare isolated e2e configuration
        run: |
          set -euo pipefail

          port="$(python - <<'PY'
          import socket

          with socket.socket() as sock:
              sock.bind(("127.0.0.1", 0))
              print(sock.getsockname()[1])
          PY
          )"
          workdir="${RUNNER_TEMP:-/tmp}/conch-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          sandbox_id="sandbox_e2e_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          namespace="conch-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          boot_image="localhost/conch/e2e:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          sudo rm -rf "$workdir"
          mkdir -p "$workdir"

          {
            echo "CONCH_E2E_WORKDIR=$workdir"
            echo "CONCH_PORT=$port"
            echo "CONCH_API_URL=http://127.0.0.1:$port"
            echo "CONCH_CONFIG=$workdir/config.yaml"
            echo "CONCH_SDK_CONFIG=$workdir/sdk-config.yaml"
            echo "CONCHD_LOG=$workdir/conchd.log"
            echo "CONCHD_PID_FILE=$workdir/conchd.pid"
            echo "CONCHD_SERVICE_PID_FILE=$workdir/conchd-service.pid"
            echo "CONCH_NAMESPACE=$namespace"
            echo "CONCH_SANDBOX_ID=$sandbox_id"
            echo "CONCH_BOOT_IMAGE=$boot_image"
          } >> "$GITHUB_ENV"

          cat > "$workdir/config.yaml" <<YAML
          app:
            name: conch-e2e

          log:
            level: debug
            output: stdout

          server:
            unix_socket: ""
            pid_file: "$workdir/conchd-service.pid"
            work_dir: "$workdir/work"
            host: 127.0.0.1
            port: $port

          network:
            pool_size: 1
            dynamic_reservation: false
            bridge_count: 1
            tap_ip: 192.168.100.2
            tap_mask: 24

          containerd:
            root_dir: "$workdir/containerd-root"
            state_dir: "$workdir/containerd-state"
            default_namespace: "$namespace"

          image:
            default_kernel_image: ""

          sandbox:
            vsock_signal_retry: 10ms
            vsock_signal_timeout: 90s
            request_timeout: 120s
          YAML

          cat > "$workdir/sdk-config.yaml" <<YAML
          sandbox:
            unix_socket: ""
            api_url: "http://127.0.0.1:$port"
            sandbox_id: "$sandbox_id"

          snapshot:
            snapshot_id: ""
            vmm_name: "cloud-hypervisor"
            vcpu_num: 1
            vcpu_max: 1
            ram_mb: 512

          image:
            image_name: "$boot_image"
            use_snapshot: false
            vmm_name: "cloud-hypervisor"
            vcpu_num: 1
            vcpu_max: 1
            ram_mb: 512
          YAML

      - name: Start conchd
        working-directory: conch-src
        run: |
          set -euo pipefail

          sudo -n env \
            PATH="$PATH" \
            HOME="$HOME" \
            CONCH_API_TIMEOUT="$CONCH_API_TIMEOUT" \
            ./bin/conchd -config "$CONCH_CONFIG" > "$CONCHD_LOG" 2>&1 &
          echo "$!" > "$CONCHD_PID_FILE"

          for _ in $(seq 1 120); do
            if curl -fsS "$CONCH_API_URL/api/snapshot/list" >/dev/null 2>&1; then
              echo "conchd is ready at $CONCH_API_URL"
              exit 0
            fi
            if ! kill -0 "$(cat "$CONCHD_PID_FILE")" >/dev/null 2>&1; then
              echo "conchd exited before becoming ready" >&2
              sed -n '1,240p' "$CONCHD_LOG" >&2 || true
              exit 1
            fi
            sleep 1
          done

          echo "timed out waiting for conchd" >&2
          sed -n '1,240p' "$CONCHD_LOG" >&2 || true
          exit 1

      - name: Convert OCI image with Conch official kernel and initrd
        working-directory: conch-src
        run: |
          set -euo pipefail

          # `conch convert` is the current source-backed conversion path:
          # conchd first resolves the OCI source in embedded containerd and
          # pulls it if missing, then converts rootfs layers to native EROFS,
          # packs the provided official kernel/initrd as the sandbox component,
          # builds a Conch boot index, and imports it back into embedded
          # containerd under CONCH_BOOT_IMAGE.
          ./bin/conch convert \
            --config "$CONCH_CONFIG" \
            -n "$CONCH_NAMESPACE" \
            --source "$OCI_IMAGE" \
            --kernel "$CONCH_KERNEL_PATH" \
            --initrd "$CONCH_INITRD_PATH" \
            -t "$CONCH_BOOT_IMAGE"

          ./bin/conch unpack \
            --config "$CONCH_CONFIG" \
            -n "$CONCH_NAMESPACE" \
            "$CONCH_BOOT_IMAGE"

      - name: Boot microVM and run SDK echo command
        working-directory: conch-src
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import time
          from conch import Sandbox

          expected = f"conch-e2e:{os.environ['GITHUB_RUN_ID']}:{os.environ['GITHUB_RUN_ATTEMPT']}"
          sandbox = None

          try:
              sandbox = Sandbox.create(
                  config_path=os.environ["CONCH_SDK_CONFIG"],
                  image_name=os.environ["CONCH_BOOT_IMAGE"],
                  namespace=os.environ["CONCH_NAMESPACE"],
                  sandbox_id=os.environ["CONCH_SANDBOX_ID"],
                  vcpu_num=1,
                  ram_mb=512,
              )
              health = sandbox.health_check()
              if health.get("status") != "OK":
                  raise RuntimeError(f"unexpected health check response: {health}")

              result = sandbox.execute(cmd="sh", args=["-c", f"printf '%s' '{expected}'"])
              if result.exit_code != 0:
                  raise RuntimeError(
                      f"command failed: exit={result.exit_code} stdout={result.stdout!r} stderr={result.stderr!r}"
                  )
              if result.stdout != expected:
                  raise RuntimeError(f"unexpected command echo: got={result.stdout!r} want={expected!r}")

              print(f"SDK command echo verified: {result.stdout}")
          finally:
              if sandbox is not None:
                  try:
                      sandbox.delete()
                      time.sleep(5)
                  except Exception as exc:
                      print(f"warning: failed to delete sandbox during test cleanup: {exc}")
          PY

      - name: Dump conchd log on failure
        if: failure()
        run: |
          set -euo pipefail
          if [ -n "${CONCHD_LOG:-}" ] && [ -f "$CONCHD_LOG" ]; then
            sed -n '1,400p' "$CONCHD_LOG"
          fi

      - name: Cleanup e2e resources
        if: always()
        run: |
          set +e

          if [ -n "${CONCH_SDK_CONFIG:-}" ] && [ -f "$CONCH_SDK_CONFIG" ]; then
            python - <<'PY'
          import os
          import time
          from conch import Sandbox

          sandbox_id = os.environ.get("CONCH_SANDBOX_ID", "")
          if sandbox_id:
              try:
                  Sandbox.delete_sandbox(
                      sandbox_id,
                      config_path=os.environ["CONCH_SDK_CONFIG"],
                      namespace=os.environ.get("CONCH_NAMESPACE") or None,
                  )
                  time.sleep(5)
              except Exception as exc:
                  print(f"warning: sandbox cleanup skipped or failed: {exc}")
          PY
          fi

          if [ -n "${CONCHD_PID_FILE:-}" ] && [ -f "$CONCHD_PID_FILE" ]; then
            conchd_pid="$(cat "$CONCHD_PID_FILE")"
            if kill -0 "$conchd_pid" >/dev/null 2>&1; then
              sudo kill "$conchd_pid" >/dev/null 2>&1 || true
              for _ in $(seq 1 30); do
                kill -0 "$conchd_pid" >/dev/null 2>&1 || break
                sleep 1
              done
              kill -0 "$conchd_pid" >/dev/null 2>&1 && sudo kill -9 "$conchd_pid" >/dev/null 2>&1 || true
            fi
          fi

          if [ -n "${CONCHD_SERVICE_PID_FILE:-}" ] && [ -f "$CONCHD_SERVICE_PID_FILE" ]; then
            service_pid="$(cat "$CONCHD_SERVICE_PID_FILE")"
            if sudo kill -0 "$service_pid" >/dev/null 2>&1; then
              sudo kill "$service_pid" >/dev/null 2>&1 || true
              for _ in $(seq 1 30); do
                sudo kill -0 "$service_pid" >/dev/null 2>&1 || break
                sleep 1
              done
              sudo kill -0 "$service_pid" >/dev/null 2>&1 && sudo kill -9 "$service_pid" >/dev/null 2>&1 || true
            fi
          fi

          if [ -n "${CONCH_E2E_WORKDIR:-}" ]; then
            sudo rm -rf "$CONCH_E2E_WORKDIR"
          fi
