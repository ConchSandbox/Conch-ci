name: Conch Build & Static Check
run-name: ${{ github.event.inputs.ci_marker || github.event.inputs.conch_ref || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      ci_marker:
        description: External CI correlation marker
        required: false
      conch_repository:
        description: Conch source repository URL
        required: false
        default: https://github.com/SToPire/Conch.git
      conch_ref:
        description: Conch source ref to validate
        required: false
        default: fix-dev-cri-test-failures

permissions:
  contents: read

concurrency:
  group: conch-pr-ci-${{ github.workflow }}-${{ github.event.inputs.ci_marker || github.event.inputs.conch_ref || github.ref }}
  cancel-in-progress: true

env:
  CONCH_REPOSITORY: ${{ github.event.inputs.conch_repository || vars.CONCH_REPOSITORY || 'https://github.com/SToPire/Conch.git' }}
  CONCH_REF: ${{ github.event.inputs.conch_ref || vars.CONCH_REF || 'fix-dev-cri-test-failures' }}

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: Conch Build & Static Check
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Install host tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            curl \
            git \
            libdeflate-dev \
            liblz4-dev \
            liblzma-dev \
            libtool \
            musl-tools \
            libzstd-dev \
            pkg-config \
            protobuf-compiler \
            shellcheck \
            uuid-dev \
            zlib1g-dev

      - name: Install erofs-utils
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          curl -fsSL \
            https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-1.9.1.tar.gz \
            -o "$workdir/erofs-utils.tar.gz"
          tar -xzf "$workdir/erofs-utils.tar.gz" -C "$workdir"
          cd "$workdir/erofs-utils-1.9.1"
          ./autogen.sh
          ./configure --prefix=/usr/local --with-libdeflate --with-libzstd
          make -j"$(nproc)"
          sudo make install

      - name: Check EROFS support
        run: |
          set -euo pipefail
          hash -r
          sudo modprobe erofs
          grep -qw erofs /proc/filesystems
          command -v mkfs.erofs
          mkfs.erofs --version
          mkfs_erofs_help="$(mkfs.erofs --help)"
          grep -q -- '--fsalignblks' <<<"$mkfs_erofs_help"

      - name: Fetch Conch source
        run: |
          set -euo pipefail
          rm -rf conch-src
          git init conch-src
          cd conch-src
          git remote add origin "$CONCH_REPOSITORY"
          git fetch --depth 1 origin "$CONCH_REF"
          git checkout --detach FETCH_HEAD
          git log --oneline -1
          git status --short --branch

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache-dependency-path: conch-src/go.sum

      - name: Set up Rust
        working-directory: conch-src
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          case "$(uname -m)" in
            x86_64) rust_target=x86_64-unknown-linux-musl ;;
            aarch64|arm64) rust_target=aarch64-unknown-linux-musl ;;
            *) echo "::error::unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          rustup target add "$rust_target"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: conch-src/sdk/pyproject.toml

      - name: Show tool versions
        working-directory: conch-src
        run: |
          set -euo pipefail
          go version
          python --version
          protoc --version
          shellcheck --version
          git rev-parse HEAD

      - name: Generate protobuf bindings
        working-directory: conch-src
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install grpcio-tools
          make gen-proto

      - name: Check shell script syntax
        working-directory: conch-src
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(find scripts initrd -type f -name '*.sh' -print 2>/dev/null | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell scripts found"
            exit 0
          fi
          bash -n "${shell_files[@]}"

      - name: Run shellcheck
        working-directory: conch-src
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(find scripts initrd -type f -name '*.sh' -print 2>/dev/null | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell scripts found"
            exit 0
          fi
          shellcheck "${shell_files[@]}"

      - name: Check Go formatting
        working-directory: conch-src
        run: |
          set -euo pipefail
          unformatted="$(find . -name '*.go' -not -path './.git/*' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "go files need gofmt:"
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Build Go commands
        working-directory: conch-src
        run: |
          set -euo pipefail
          go build ./cmd/conch ./cmd/conchd

      - name: Check and build conch-init
        working-directory: conch-src
        run: |
          set -euo pipefail
          make -C conch-init check
          make -C conch-init test
          make build-conch-init
          test -x ./bin/conch-init

      - name: Run Go tests
        working-directory: conch-src
        run: |
          set -euo pipefail
          go test ./...

      - name: Run Go vet
        working-directory: conch-src
        run: |
          set -euo pipefail
          go vet ./...

      - name: Check Python SDK import path
        working-directory: conch-src
        run: |
          set -euo pipefail
          python -m pip install -e './sdk[test]'
          python - <<'PY'
          from conch import AgentClient, Sandbox
          from conch.sandbox import generate_random_id

          assert AgentClient
          assert Sandbox
          assert generate_random_id().startswith("sandbox_")
          PY
